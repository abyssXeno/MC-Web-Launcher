<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <style>
        /* Réinitialisation et Base */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0b0b0d;
            color: #e2e8f0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Fond avec dégradé radial discret */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, #181920 0%, #08080a 100%);
            z-index: -1;
        }

        /* Conteneur Principal */
        .container {
            text-align: center;
            padding: 2.5rem;
            max-width: 480px;
            width: 100%;
            background: rgba(20, 20, 25, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        /* Titre Style Cyber-Gold */
        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5), 0 0 20px rgba(212, 175, 55, 0.2);
            margin-bottom: 1rem;
        }

        .accent {
            color: #d4af37;
            position: relative;
        }

        p {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        /* Liens et Boutons */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 2rem;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: #141416;
            color: #ffffff;
            border: 1px solid #27272a;
            position: relative;
            overflow: hidden;
        }

        /* Effet de reflet au survol */
        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.08), transparent);
            transition: 0.6s;
        }

        .btn:hover::before {
            left: 100%;
        }

        /* Hover global doré */
        .btn:hover {
            border-color: #d4af37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.25);
            transform: translateY(-2px);
            color: #d4af37;
        }

        /* Icônes fictifs ou espaces à gauche du texte si besoin */
        .btn span {
            margin-left: 8px;
        }

        /* Footer */
        .footer {
            margin-top: 3rem;
            font-size: 0.75rem;
            color: #45454a;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Coming <span class="accent">Soon</span></h1>
        <p>Quelque chose de lourd se prépare en coulisses. En attendant l'ouverture officielle, vous pouvez soutenir le projet ici :</p>
        
        <div class="links-container">
            <!-- Remplacez VOTRE_PROFIL par vos vrais identifiants ou liens complets -->
            <a href="https://beacons.ai/aby.xfcxeno" target="_blank" class="btn">
                Soutenir sur Beacons.ai
            </a>
            
            <a href="https://ko-fi.com/xfcxeno" target="_blank" class="btn">
                Offrir un café sur Ko-fi
            </a>
        </div>
        
        <div class="footer">
            &copy; 2026 &bull; Tous droits réservés
        </div>
    </div>

</body>
</html>
